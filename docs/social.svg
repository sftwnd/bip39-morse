<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="#0b0b0b"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <ellipse cx="318" cy="318" rx="280" ry="280" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="638" rx="4" fill="none" stroke="#1e1e1e" stroke-width="2"/>

  <!-- logo -->
  <g transform="translate(171,171) scale(2.1)">
    <rect width="140" height="140" rx="32" fill="#0f0f0f" stroke="#2c2c2c" stroke-width="1.2"/>
    <path d="M70 16 L106 33 L106 73 Q106 101 70 118 Q34 101 34 73 L34 33 Z" fill="#150f00" stroke="#f5a623" stroke-width="2.2"/>
    <path d="M70 30 L96 44 L96 71 Q96 91 70 104 Q44 91 44 71 L44 44 Z" fill="#0f0900" stroke="#f5a623" stroke-width="1" opacity="0.45"/>
    <circle cx="52" cy="62" r="5" fill="#f5a623"/>
    <rect x="61" y="57" width="18" height="10" rx="5" fill="#f5a623"/>
    <circle cx="85" cy="62" r="5" fill="#f5a623"/>
    <rect x="50" y="77" width="18" height="8" rx="4" fill="#f5a623" opacity="0.45"/>
    <circle cx="74" cy="81" r="3.5" fill="#f5a623" opacity="0.45"/>
    <text x="70" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#7a5010" letter-spacing="2">BIP·39</text>
  </g>

  <!-- wordmark -->
  <text x="560" y="296" font-family="sans-serif" font-weight="700" font-size="96" fill="#f4f4f4" letter-spacing="-1">MorseKey</text>

  <!-- morse motif: M K -->
  <g fill="#f5a623">
    <rect x="562" y="338" width="24" height="8" rx="4"/>
    <rect x="596" y="338" width="24" height="8" rx="4"/>
    <rect x="648" y="338" width="24" height="8" rx="4"/>
    <circle cx="686" cy="342" r="4"/>
    <rect x="698" y="338" width="24" height="8" rx="4"/>
  </g>

  <!-- tagline -->
  <text x="562" y="392" font-family="monospace" font-size="33" fill="#9a9a9a">BIP39 seed phrases  &#8644;  Morse code</text>
  <text x="562" y="438" font-family="monospace" font-size="21" fill="#5f5f5f">offline · deterministic · open-source</text>
</svg>

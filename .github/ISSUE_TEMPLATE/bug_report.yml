name: Bug report
description: Report something that does not behave as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report.

        **Before submitting, please confirm:**
        - You are running the latest released version (or `master`).
        - You have searched existing issues for duplicates.

        > **Do not paste real BIP39 mnemonics, real entropy hex, or
        > real wallet addresses anywhere in this issue.** Use the iroha
        > demo inputs, the Trezor public test vectors in
        > `tests/vectors/`, or a freshly generated throwaway phrase
        > to reproduce. Issues containing what look like real seeds
        > may be redacted or closed.

        If you believe you have found a **security vulnerability**,
        do not open a public issue — see
        [SECURITY.md](../blob/master/SECURITY.md) for the private
        reporting channel.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `bip39-morse --help | head -1` or commit SHA if running from source.
      placeholder: "1.0.0 (or commit a25d0ff)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "Python 3.11.2"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / terminal
      description: OS, terminal emulator, and locale (`echo $LANG`).
      placeholder: "macOS 14.6, iTerm2 3.5, en_US.UTF-8"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command line
      description: Exact command you ran, including flags. Redact any custom paths.
      placeholder: "bip39-morse --reverse --length 12 --morse-table examples/japanese.txt --lang jp"
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include error output / stack traces if any. Use safe (non-real) inputs in any reproduction sequence.
      render: text
    validations:
      required: true
  - type: textarea
    id: roundtrip
    attributes:
      label: Round-trip check (if applicable)
      description: |
        If the bug touches entropy / mnemonic correctness, please paste the
        forward → reverse → forward entropy hex values (using safe inputs
        only). They should match; if they don't, that's the bug.
      placeholder: "Step 1 hex: ...\nStep 3 hex: ...\nDelta: ..."
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: This report contains no real BIP39 mnemonics, entropy, or wallet addresses.
          required: true
        - label: I have read the project's security model in the README and SECURITY.md.
          required: true

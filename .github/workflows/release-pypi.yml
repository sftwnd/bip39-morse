name: Publish to PyPI

# Production PyPI publish — fires only when a GitHub Release is published
# from the Releases UI. Tag pushes alone do NOT trigger this; the release
# must exist (and be marked as "published", not draft).
#
# Authentication is OIDC trusted publishing: no PyPI token in repo
# secrets. PyPI side requires a "pending publisher" record matching:
#   project name      = bip39-morse
#   repository owner  = sftwnd
#   repository name   = bip39-morse
#   workflow filename = release-pypi.yml
#   environment       = pypi
# See docs/PUBLISHING.md for the one-time setup.
#
# Artefacts are signed with sigstore via PEP 740 attestations, so users
# can cryptographically verify a wheel was built by this workflow from
# this repository at a known commit.

on:
  release:
    types: [published]
  # Manual fallback. The canonical trigger is the GitHub Release above —
  # cut a release in the Releases UI and this workflow fires automatically.
  # workflow_dispatch is here for recovery scenarios: republishing after a
  # PyPI yank-and-bump-version, or re-firing if the release event was
  # somehow missed. PyPI's per-version uniqueness still prevents accidental
  # overwrites — you can't dispatch a 1.0.2 publish if 1.0.2 already lives
  # on PyPI; bump pyproject.toml first.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Show resulting artefacts
        run: ls -la dist/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bip39-morse
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # sigstore signing (default in recent versions)

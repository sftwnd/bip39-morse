name: Publish to TestPyPI

# TestPyPI publish — fires only on manual dispatch from the Actions tab.
# Build artefacts are produced by a separate job and handed to the publish
# job through artifact upload/download, so the publish job has no source
# checkout — minimising what a hypothetical malicious dependency could
# do during install/build.
#
# Authentication is OIDC trusted publishing: no PyPI token in repo
# secrets. PyPI side requires a "pending publisher" record matching:
#   project name      = bip39-morse
#   repository owner  = sftwnd
#   repository name   = bip39-morse
#   workflow filename = release-testpypi.yml
#   environment       = testpypi
# See docs/PUBLISHING.md for the one-time setup.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Show resulting artefacts
        run: ls -la dist/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bip39-morse
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI's PEP 740 attestation support has been unreliable;
          # keep attestations off here. Prod workflow keeps them on.
          attestations: false
